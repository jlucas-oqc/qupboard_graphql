# This workflow runs on pull requests and provides test and coverage reporting for PRs.

name: PR Per-Commit Actions

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test-run:
    name: Test suite (matrix)
    if: always()
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-version: ${{ matrix.python-version }}

  coverage-report:
    name: Coverage report (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: test-run
    if: always()
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          name: junit-${{ matrix.python-version }}
          path: reports
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ inputs.python-version }}-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: reports
      - name: Generate PR summary (tests & coverage)
        run: |
          poetry run python scripts/coverage_summary.py > summary.md
          cat summary.md >> "$GITHUB_STEP_SUMMARY"
        if: always()
      - name: Post coverage summary as PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-file: summary.md
        if: github.event_name == 'pull_request'

  publish-unit-test-results:
    name: Publish Unit Test Results
    runs-on: ubuntu-latest
    needs: test-run
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download JUnit artifacts (3.11)
        uses: actions/download-artifact@v4
        with:
          name: junit-3.11
          path: reports
      - name: Download JUnit artifacts (3.12)
        uses: actions/download-artifact@v4
        with:
          name: junit-3.12
          path: reports
      - name: Download JUnit artifacts (3.13)
        uses: actions/download-artifact@v4
        with:
          name: junit-3.13
          path: reports
      - name: Download JUnit artifacts (3.14)
        uses: actions/download-artifact@v4
        with:
          name: junit-3.14
          path: reports
      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/junit-*.xml
