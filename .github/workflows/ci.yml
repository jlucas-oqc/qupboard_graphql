# Unified CI workflow for all commits and PRs
name: CI Actions

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  test-run:
    name: Test suite (matrix)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python and Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests with coverage
        run: |
          poetry run pytest -n auto \
            --tb=short \
            --junitxml=reports/junit-${{ matrix.python-version }}.xml \
            --cov=src/qupboard_graphql \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage-${{ matrix.python-version }}.xml \
            --cov-report=html:reports/htmlcov-${{ matrix.python-version }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.python-version }}
          path: reports/junit-${{ matrix.python-version }}.xml
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            reports/coverage-${{ matrix.python-version }}.xml
            reports/htmlcov-${{ matrix.python-version }}/
          retention-days: 30

  aggregate-and-publish:
    name: Aggregate and Publish Results
    runs-on: ubuntu-latest
    needs: test-run
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: reports
          merge-multiple: true

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: reports
          merge-multiple: true

      - name: Setup Python and Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: '3.14'

      - name: Generate coverage summary
        run: |
          ls -l reports
          echo '<!-- coverage-summary -->' > summary.md
          poetry run python scripts/coverage_summary.py >> summary.md
          cat summary.md >> "$GITHUB_STEP_SUMMARY"
        if: always()

      - name: Find coverage summary comment
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- coverage-summary -->'
        if: github.event_name == 'pull_request'

      - name: Create or update coverage summary comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: summary.md
          edit-mode: replace
        if: github.event_name == 'pull_request'

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/junit-*.xml
